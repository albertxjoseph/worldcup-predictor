name: Daily data refresh

# Runs every day, regenerates web/src/data.json (predictions, title odds,
# results, and LLM previews), and pushes it. Vercel auto-redeploys on the push.
# Manual runs: Actions tab → "Daily data refresh" → "Run workflow".

on:
  schedule:
    - cron: "0 9 * * *"      # ~09:00 UTC daily (after the day's games land)
  workflow_dispatch: {}        # manual run button

permissions:
  contents: write              # allow the job to push the updated data.json

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # pandas 1.5.3 has no 3.12 wheel
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Retrain models on the latest results
        run: |
          python model.py
          python dixon_coles.py

      - name: Export site data (with previews if key is set)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python export_site_data.py

      - name: Commit & push if the data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/src/data.json
          if git diff --cached --quiet; then
            echo "No data changes — nothing to deploy."
          else
            git commit -m "chore: daily data refresh"
            git push
          fi
